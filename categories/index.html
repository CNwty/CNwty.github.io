    <script>
    (function () {
        function hideLoadingOverlay() {
            var loading = document.getElementById("loading");
            var loadcontent = document.getElementById("loadcontent");
            var loadleft = document.getElementById("loadleft");
            var loadright = document.getElementById("loadright");

            if (!loading) return;
            if (loading.getAttribute("data-hidden") === "true") return;

            loading.setAttribute("data-hidden", "true");

            if (loadcontent) {
                loadcontent.style.opacity = 0;
            }

            window.setTimeout(function () {
                if (loadleft) loadleft.style.width = 0;
                if (loadright) loadright.style.width = 0;
            }, 220);

            window.setTimeout(function () {
                loading.style.display = "none";
            }, 560);
        }

        window.__hideLoadingOverlay = hideLoadingOverlay;

        if (!window.Vue) {
            hideLoadingOverlay();
            return;
        }

        new Vue({
        el: "#layout",
        data: {
            show_page: true,
            onload_menu: false,
            menu_show: false,
            card_top: 100
        },
        created: function () {
            var that = this

            window.addEventListener('load', function () {
                that.show_page = true
                hideLoadingOverlay()
            }, { once: true })

            window.setTimeout(function () {
                that.show_page = true
                hideLoadingOverlay()
            }, 2200)
        },
        mounted: function () {
            var that = this;
            var subtitles = ["技进乎道，文以载道","关注交付质量，也关心页面气质","从细节出发，做长期可维护的站点","记录真实项目，不堆无效装饰"];
            var descriptions = ["分享技术，记录成长，也保留一点个人表达。","把博客当成长期维护的软件，而不是一次性页面。","持续整理项目、笔记与实践，让内容更容易被再次使用。","从样式、信息结构到部署流程，一步步打磨清楚。"];
            var timeScene = {"enable":true,"timezone":"Asia/Shanghai","avatar":"images/avatar-transparent.png","scenes":{"sunrise":"images/scenes/sunrise.png","noon":"images/scenes/noon.png","sunset":"images/scenes/sunset.png","sunset_late":"images/scenes/sunset-late.png","dusk":"images/scenes/dusk.png","night":"images/scenes/night.png"}};
            var siteRoot = "/";
            var prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            var latestSceneKey = 'noon';

            if (subtitles.length && descriptions.length) {
                setInterval(function() {
                    var newSubtitleIndex = Math.floor(Math.random() * subtitles.length);
                    var newDescriptionIndex = Math.floor(Math.random() * descriptions.length);
                    var subtitleElement = document.getElementById('rotating-subtitle');
                    var descriptionElement = document.getElementById('rotating-description');

                    if (subtitleElement) {
                        subtitleElement.classList.add('fade-out');
                        setTimeout(function() {
                            subtitleElement.textContent = subtitles[newSubtitleIndex];
                            subtitleElement.classList.remove('fade-out');
                            subtitleElement.classList.add('fade-in');
                            setTimeout(function() {
                                subtitleElement.classList.remove('fade-in');
                            }, 600);
                        }, 300);
                    }

                    if (descriptionElement) {
                        descriptionElement.classList.add('fade-out');
                        setTimeout(function() {
                            descriptionElement.textContent = descriptions[newDescriptionIndex];
                            descriptionElement.classList.remove('fade-out');
                            descriptionElement.classList.add('fade-in');
                            setTimeout(function() {
                                descriptionElement.classList.remove('fade-in');
                            }, 600);
                        }, 300);
                    }
                }, 5000);
            }

            if (timeScene.enable && timeScene.scenes) {
                var scenePaths = timeScene.scenes;
                var sceneTimezone = timeScene.timezone || 'Asia/Shanghai';

                var applyBeijingScene = function () {
                    var formatter = new Intl.DateTimeFormat('zh-CN', {
                        timeZone: sceneTimezone,
                        hour: '2-digit',
                        minute: '2-digit',
                        hourCycle: 'h23'
                    });
                    var parts = formatter.formatToParts(new Date());
                    var hour = 0;
                    var minute = 0;

                    parts.forEach(function (part) {
                        if (part.type === 'hour') hour = parseInt(part.value, 10);
                        if (part.type === 'minute') minute = parseInt(part.value, 10);
                    });

                    var totalMinutes = hour * 60 + minute;
                    var sceneKey = 'night';

                    if (totalMinutes >= 300 && totalMinutes < 660) {
                        sceneKey = 'sunrise';
                    } else if (totalMinutes >= 660 && totalMinutes < 900) {
                        sceneKey = 'noon';
                    } else if (totalMinutes >= 900 && totalMinutes < 1020) {
                        sceneKey = 'sunset';
                    } else if (totalMinutes >= 1020 && totalMinutes < 1080) {
                        sceneKey = 'sunset_late';
                    } else if (totalMinutes >= 1080 && totalMinutes < 1140) {
                        sceneKey = 'dusk';
                    }

                    var scenePath = scenePaths[sceneKey] || scenePaths.noon;
                    if (!scenePath) return;

                    var sceneUrl = scenePath.indexOf('http') === 0 ? scenePath : siteRoot + scenePath;
                    var isMobileViewport = window.innerWidth <= 900;
                    var scenePositionMap = {
                        sunrise: isMobileViewport ? '32% top' : '52% 18%',
                        noon: isMobileViewport ? '44% top' : '50% 16%',
                        sunset: isMobileViewport ? '66% top' : '54% 22%',
                        sunset_late: isMobileViewport ? '72% top' : '56% 24%',
                        dusk: isMobileViewport ? '56% top' : '52% 20%',
                        night: isMobileViewport ? '54% top' : '50% 18%'
                    };

                    [document.documentElement, document.body].forEach(function (target) {
                        target.style.backgroundImage = "url('" + sceneUrl + "')";
                        target.style.backgroundRepeat = 'no-repeat';
                        target.style.backgroundSize = 'cover';
                        target.style.backgroundAttachment = isMobileViewport ? 'scroll' : 'fixed';
                        target.style.backgroundPosition = scenePositionMap[sceneKey] || (isMobileViewport ? 'center top' : 'center center');
                    });
                    latestSceneKey = sceneKey;
                    document.body.setAttribute('data-beijing-scene', sceneKey);
                };

                applyBeijingScene();
                setInterval(applyBeijingScene, 60000);
            }

            var initRevealMotion = function () {
                var targets = document.querySelectorAll('.home-info .wrap, .hero-panel-card, .section-heading, .post, .card-style, .article, #archives, .categories-tags');
                if (!targets.length) return;

                targets.forEach(function (element, index) {
                    element.classList.add('reveal-enter');
                    element.style.setProperty('--reveal-delay', (index % 6) * 70 + 'ms');
                });

                if (prefersReducedMotion || !('IntersectionObserver' in window)) {
                    targets.forEach(function (element) {
                        element.classList.add('is-visible');
                    });
                    return;
                }

                var observer = new IntersectionObserver(function (entries) {
                    entries.forEach(function (entry) {
                        if (!entry.isIntersecting) return;
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    });
                }, {
                    threshold: 0.14,
                    rootMargin: '0px 0px -10% 0px'
                });

                targets.forEach(function (element) {
                    observer.observe(element);
                });
            };

            var stripHeadingAnchors = function () {
                var anchors = document.querySelectorAll('.article .content .headerlink, #home-posts .excerpt .content .headerlink');
                if (!anchors.length) return;

                anchors.forEach(function (anchor) {
                    anchor.remove();
                });
            };

            var initHomeDashboard = function () {
                if (!document.body.classList.contains('home')) return;

                var clockElement = document.getElementById('dashboard-clock');
                var dateElement = document.getElementById('dashboard-date');
                var weekdayElement = document.getElementById('dashboard-weekday');
                var sceneElement = document.getElementById('dashboard-scene');
                var timezone = (timeScene && timeScene.timezone) || 'Asia/Shanghai';
                var sceneNames = {
                    sunrise: '清晨',
                    noon: '午后',
                    sunset: '夕照',
                    sunset_late: '落日',
                    dusk: '薄暮',
                    night: '夜色'
                };
                var weekdayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

                var updateTimePanel = function () {
                    var now = new Date();
                    var clockFormatter = new Intl.DateTimeFormat('zh-CN', {
                        timeZone: timezone,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hourCycle: 'h23'
                    });
                    var dateFormatter = new Intl.DateTimeFormat('zh-CN', {
                        timeZone: timezone,
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    var weekdayFormatter = new Intl.DateTimeFormat('zh-CN', {
                        timeZone: timezone,
                        weekday: 'short'
                    });

                    if (clockElement) {
                        clockElement.textContent = clockFormatter.format(now);
                    }

                    if (dateElement) {
                        dateElement.textContent = dateFormatter.format(now);
                    }

                    if (weekdayElement) {
                        var weekdayText = weekdayFormatter.format(now);
                        weekdayElement.textContent = weekdayNames.find(function (item) {
                            return weekdayText.indexOf(item.replace('周', '')) !== -1;
                        }) || weekdayText;
                    }

                    if (sceneElement) {
                        sceneElement.textContent = sceneNames[latestSceneKey] || '午后';
                    }
                };

                updateTimePanel();
                setInterval(updateTimePanel, 1000);
            };

            var initInteractiveSurfaces = function () {
                if (prefersReducedMotion || window.matchMedia('(pointer: coarse)').matches) return;

                var surfaces = document.querySelectorAll('.home-info .wrap, .hero-panel-card, .post, .card-style, .article');
                surfaces.forEach(function (surface) {
                    surface.classList.add('interactive-surface');

                    surface.addEventListener('pointermove', function (event) {
                        var rect = surface.getBoundingClientRect();
                        var x = event.clientX - rect.left;
                        var y = event.clientY - rect.top;
                        var rotateY = ((x / rect.width) - 0.5) * 5;
                        var rotateX = (0.5 - (y / rect.height)) * 4;

                        surface.style.setProperty('--pointer-x', x + 'px');
                        surface.style.setProperty('--pointer-y', y + 'px');
                        surface.style.setProperty('--surface-glow', '1');
                        surface.style.setProperty('--surface-rotate-x', rotateX.toFixed(2) + 'deg');
                        surface.style.setProperty('--surface-rotate-y', rotateY.toFixed(2) + 'deg');
                    });

                    surface.addEventListener('pointerleave', function () {
                        surface.style.setProperty('--surface-glow', '0');
                        surface.style.setProperty('--surface-rotate-x', '0deg');
                        surface.style.setProperty('--surface-rotate-y', '0deg');
                    });
                });
            };

            var initHeroParallax = function () {
                var hero = document.getElementById('home-head');
                if (!hero || prefersReducedMotion || window.matchMedia('(pointer: coarse)').matches) return;

                var updateHeroMotion = function (event) {
                    var rect = hero.getBoundingClientRect();
                    var x = (event.clientX - rect.left) / rect.width;
                    var y = (event.clientY - rect.top) / rect.height;
                    var shiftX = (x - 0.5) * 26;
                    var shiftY = (y - 0.5) * 18;
                    var tiltX = (0.5 - y) * 5;
                    var tiltY = (x - 0.5) * 7;

                    hero.style.setProperty('--hero-shift-x', shiftX.toFixed(2) + 'px');
                    hero.style.setProperty('--hero-shift-y', shiftY.toFixed(2) + 'px');
                    hero.style.setProperty('--hero-tilt-x', tiltX.toFixed(2) + 'deg');
                    hero.style.setProperty('--hero-tilt-y', tiltY.toFixed(2) + 'deg');
                    hero.style.setProperty('--hero-glow-x', (x * 100).toFixed(2) + '%');
                    hero.style.setProperty('--hero-glow-y', (y * 100).toFixed(2) + '%');
                };

                hero.addEventListener('pointermove', updateHeroMotion);
                hero.addEventListener('pointerleave', function () {
                    hero.style.setProperty('--hero-shift-x', '0px');
                    hero.style.setProperty('--hero-shift-y', '0px');
                    hero.style.setProperty('--hero-tilt-x', '0deg');
                    hero.style.setProperty('--hero-tilt-y', '0deg');
                    hero.style.setProperty('--hero-glow-x', '50%');
                    hero.style.setProperty('--hero-glow-y', '35%');
                });
            };

            var initHomePostTransitions = function () {
                var containers = document.querySelectorAll('#home-posts .post a[href], .page-current a[href]');
                if (!containers.length) return;

                var shouldHandleLink = function (link, event) {
                    if (!link) return false;
                    if (link.target === '_blank') return false;
                    if (event.defaultPrevented) return false;
                    if (event.button !== 0) return false;
                    if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return false;

                    var href = link.getAttribute('href');
                    if (!href || href.charAt(0) === '#') return false;
                    if (/^https?:\/\//.test(href)) return false;
                    return true;
                };

                containers.forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        if (!shouldHandleLink(link, event)) return;
                        event.preventDefault();

                        var targetUrl = link.href;
                        document.body.classList.add('page-transitioning');

                        var postsWrap = document.getElementById('home-posts-wrap');
                        if (postsWrap) {
                            postsWrap.classList.add('posts-switching');
                        }

                        setTimeout(function () {
                            window.location.href = targetUrl;
                        }, 260);
                    });
                });
            };

            var initHomeMascot = function () {
                if (!document.body.classList.contains('home')) return;

                var mascotImage = document.getElementById('home-mascot-image');
                if (!mascotImage) return;

                var mascotPool = [
                    siteRoot + 'images/mcgif-4.gif',
                    siteRoot + 'images/mcgif-5.gif'
                ];
                var chosenMascot = mascotPool[Math.floor(Math.random() * mascotPool.length)];

                mascotImage.src = chosenMascot + '?v=' + Date.now();
                mascotImage.dataset.ready = 'true';
            };

            stripHeadingAnchors();
            initRevealMotion();
            initInteractiveSurfaces();
            initHeroParallax();
            initHomePostTransitions();
            initHomeDashboard();
            initHomeMascot();

            window.addEventListener('scroll', function () {
                that.menu_show = false
            })
        },
        methods: {
            home_click: function () {
                window.scrollTo({
                    top: window.innerHeight - 80,
                    behavior: "smooth",
                });
            }
        }
    })
    })()
</script>
